<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProseKit Static Renderer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <p class="eyebrow">prosekit-static-renderer</p>
        <h1 class="title">ProseKit Static Renderer</h1>
        <p class="subtitle">
          Render ProseKit document JSON to HTML, Markdown, and framework output
          without creating a second editor instance.
        </p>
      </header>

      <main class="workspace">
        <section class="panel editor-panel" aria-label="Editor">
          <div class="toolbar">
            <span class="label">editor</span>
          </div>
          <div id="editor"></div>
        </section>

        <section class="panel output-panel" aria-label="Renderer output">
          <div class="toolbar">
            <span class="label">output</span>
            <div class="button-group" role="group" aria-label="Renderer format">
              <button
                class="button-group-item active"
                type="button"
                data-output-mode="html"
                aria-pressed="true"
              >
                HTML
              </button>
              <button
                class="button-group-item"
                type="button"
                data-output-mode="markdown"
                aria-pressed="false"
              >
                Markdown
              </button>
              <button
                class="button-group-item"
                type="button"
                data-output-mode="react"
                aria-pressed="false"
              >
                React
              </button>
              <button class="button-group-item" type="button" disabled>
                Vue
              </button>
              <button class="button-group-item" type="button" disabled>
                Solid
              </button>
              <button class="button-group-item" type="button" disabled>
                Preact
              </button>
              <button class="button-group-item" type="button" disabled>
                Svelte
              </button>
            </div>
          </div>
          <div id="text-output" class="output"></div>
          <div id="react-output" class="output-render ProseMirror" hidden></div>
        </section>
      </main>

      <footer class="footer">
        <a href="https://prosekit.dev" target="_blank" rel="noreferrer"
          >ProseKit</a
        >
        <span class="sep">/</span>
        <a
          href="https://www.npmjs.com/package/prosekit-static-renderer"
          target="_blank"
          rel="noreferrer"
          >npm</a
        >
        <span class="sep">/</span>
        <a
          href="https://github.com/shlroland/prosekit-extension-static-renderer"
          target="_blank"
          rel="noreferrer"
          >GitHub</a
        >
      </footer>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
